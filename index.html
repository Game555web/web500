        <button onclick="closeMgrModal()"

    // ══════════════════════════════════════════════
    // LOGIN / AUTH
    // ══════════════════════════════════════════════
    function doLogin() {
      const u = document.getElementById('loginUser').value.toLowerCase();
      const p = document.getElementById('loginPass').value;
      if (!u || !p) { showToast('กรุณากรอกข้อมูลให้ครบถ้วน', 'error'); return; }
      if (p !== '1234') { showToast('รหัสผ่านไม่ถูกต้อง', 'error'); return; }

      if (u === 'mgr' || u === 'manager') {
        currentRole = 'mgr';
      } else {
        currentRole = 'hr';
      }

      document.getElementById('page-login').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      setupSidebar();
      showPage('dashboard');
      showToast('เข้าสู่ระบบสำเร็จ 🎉');
    }

    function doLogout() {
      if (!confirm('ยืนยันการออกจากระบบ?')) return;

      // ล้างค่าเดิมในฟอร์ม Login
      document.getElementById('loginUser').value = '';
      document.getElementById('loginPass').value = '';

      // สลับหน้า
      document.getElementById('app').style.display = 'none';
      document.getElementById('page-login').style.display = 'flex';

      showToast('ออกจากระบบเรียบร้อยแล้ว 🚪', 'info');

      // รีเซ็ตตัวแปรหน้าปัจจุบัน
      currentPage = 'dashboard';
    }

      else if (type === 'mission') item = DATA.missions.find(x => x.id === id);

      title.textContent = item ? item.name : 'ดูตัวอย่าง';
      subtitle.textContent = type === 'org' ? 'การปรับโครงสร้างหน่วยงาน' : 'การเสนอภารกิจใหม่';

      body.innerHTML = `
        <div class="smart-analysis">

          <p style="font-size:13px; color:#1e40af; line-height:1.5;">
            "จากการตรวจสอบระบบพบว่า การปรับปรุงโครงสร้างนี้สอดคล้องกับ พ.ร.บ. มหาวิทยาลัย มาตรา 24 แต่พบจุดที่ต้องพิจารณาเพิ่มคือ **ภารกิจซ้ำซ้อน** กับหน่วยงานกองแผน 1 จุด"
          </p>
        </div>

          <div class="diff-header">เปรียบเทียบการเปลี่ยนแปลง (โครงสร้างเดิม vs โครงสร้างใหม่)</div>
          <div class="diff-item">
            <div style="font-weight:600;">โครงสร้างหน่วยงาน</div>
            <div class="diff-old">- กองงานห้องสมุดย่อย (ยกเลิก)</div>
            <div class="diff-new">+ กองนวัตกรรมการเรียนรู้ (จัดตั้งใหม่)</div>
          </div>
          <div class="diff-item">
            <div style="font-weight:600;">จำนวนบุคลากร</div>
            <div class="diff-old">- 12 อัตรา</div>
            <div class="diff-new">+ 15 อัตรา (ขอเพิ่ม 3 อัตรา)</div>
          </div>
          <div class="diff-item">
            <div style="font-weight:600;">ภารกิจที่เพิ่มใหม่</div>
            <div class="diff-new">+ พัฒนาสื่อการเรียนรู้แบบ ดิจิทัล</div>
            <div class="diff-new">+ บริหารจัดการระบบ แพลตฟอร์มการเรียนรู้</div>
          </div>
        </div>

          <div class="card-header" style="font-size:14px;">📄 เอกสารแนบ</div>

    function closeDrawer() {
      const drawer = document.getElementById('smartDrawer');

    function toggleDetails(id) {

    function renderStructureInfo() {
      // Build hierarchical structure
      const rootUnits = DATA.orgStructures.filter(u => u.parent === '-');

      const buildTree = (parentName) => {
        const children = DATA.orgStructures.filter(u => u.parent === parentName);
        if (children.length === 0) return '';

        return `<div class="tree-children">
          ${children.map(child => `
            <div class="tree-node">
              ${renderNode(child)}
              ${buildTree(child.name)}
            </div>
          `).join('')}
        </div>`;
      };

      const renderNode = (unit) => {
        const unitPositions = DATA.positions.filter(p => p.unit === unit.name);
        const unitMissions = DATA.missions.filter(m => m.unit === unit.name);

        return `
          <div class="node-header level-${unit.level}" onclick="toggleDetails(${unit.id})">
            <div class="node-info">
              <div class="node-icon">${unit.level === 'สำนักงาน' ? '🏛️' : unit.level === 'สำนัก' ? '📂' : '📁'}</div>
              <div>
                <div class="node-title">${unit.name}</div>
                <div class="node-meta">${unit.code} • ${unit.level}</div>
              </div>

            <div class="node-stats">
              <div class="node-stat">
                <span>${unitPositions.length}</span>
                <span>ตำแหน่ง</span>

                  ${unitMissions.filter(m => m.type === 'หลัก').length ? unitMissions.filter(m => m.type === 'หลัก').map(m => `<li><span>${m.name}</span>${statusBadge(m.status)}</li>`).join('') : '<li style="color:var(--gray-400)">ไม่มีภารกิจหลัก</li>'}
                </ul>
             </div>
          </div>
        `;
      };

      return `

    function openModal(title, body, footer, large) {
      document.getElementById('modalTitle').textContent = title;
      document.getElementById('modalBody').innerHTML = body;
      document.getElementById('modalFooter').innerHTML = footer;
      document.getElementById('modalBox').className = 'modal' + (large ? ' modal-lg' : '');
      document.getElementById('modalOverlay').classList.add('open');
    }
    function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
    function closeModalOnBg(e) { if (e.target === document.getElementById('modalOverlay')) closeModal(); }

    function _mgrModal(title, sub, bodyHtml, footerHtml) {

    function mgrSelectPlan(plan, btn) {
      // Handle MGR Dashboard Plan Cards
      const mgrCards = document.querySelectorAll('.mgr-plan-card');
      if (mgrCards.length > 0) {
        mgrCards.forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.mgr-plan-btn').forEach(b => { b.style.background = 'transparent'; b.style.color = '#1e3a5f'; });
      }

      // Handle Recommendation Page Plan Cards (New Layout)
      const recBoxes = document.querySelectorAll('.plan-box');
      if (recBoxes.length > 0) {
        recBoxes.forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.btn-select-plan').forEach(b => {
          b.classList.remove('active');
          b.textContent = 'เลือกแผนนี้';
          b.style.background = '#374151';
        });
      }

      const card = btn.closest('.mgr-plan-card') || btn.closest('.plan-box');
      if (card) card.classList.add('active');

      if (btn.classList.contains('btn-select-plan')) {
        btn.classList.add('active');
        btn.textContent = '✓ เลือกแผนนี้แล้ว';
        btn.style.background = '#8b5cf6';
      } else {
        btn.style.background = '#1e3a5f';
        btn.style.color = '#fff';
      }

      showToast('เลือกแผน ' + plan + ' เรียบร้อยแล้ว ✓', 'success');
    }

          </div>
          <div style="background:#EFF8FF;border:1px solid #fef08a;border-radius:10px;padding:14px;">
            <div style="font-size:12px;font-weight:800;color:#854d0e;margin-bottom:6px;">⚠️ ข้อสังเกต (1 รายการ)</div>
            <div style="font-size:12px;color:#713f12;line-height:1.6;">ภาระงานรวมเกินเกณฑ์มาตรฐาน 5% — แนะนำให้ปรับจำนวนอัตรากำลังหรือกระจายงาน</div>
          </div>
          <div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:14px;">
            <div style="font-size:12px;font-weight:800;color:#166534;margin-bottom:6px;">✅ รายการที่ผ่านแล้ว (4 รายการ)</div>
            <div style="font-size:12px;color:#14532d;line-height:1.8;">
              ✓ โครงสร้างมีข้อมูลครบถ้วน<br>
              ✓ สอดคล้องกับ พ.ร.บ. มหาวิทยาลัย มาตรา 24<br>
              ✓ จำนวนภารกิจอยู่ในเกณฑ์ที่กำหนด<br>
              ✓ ตำแหน่งงานเชื่อมโยงถูกต้อง
            </div>
          </div>
          <div style="font-size:11px;color:#64748b;text-align:right;">ตรวจสอบโดย: ธนพร สมใจ (HR) — 4 พ.ค. 2026</div>
        </div>`
      );
    }
    function mgrApplyFix(btn) {
      const li = btn.closest('li');
      li.style.opacity = '0.5';
      li.style.textDecoration = 'line-through';
      btn.textContent = '✓ นำไปใช้แล้ว';
      btn.disabled = true;
      showToast('นำการแก้ไขไปใช้กับโครงสร้างเรียบร้อยแล้ว ✓', 'success');
    }
    function mgrPreviewFix() {
      _mgrModal('ดูตัวอย่าง: แก้ไขโครงสร้างไม่สมดุล', 'ดูตัวอย่างก่อนนำไปใช้จริง',
        `<div style="font-size:13px;color:#374151;line-height:1.7;">
          <p style="margin-bottom:12px;">ระบบแนะนำให้ <b>ตั้งหน่วยสนับสนุนไอที (IT Support) ใหม่</b> เพื่อรองรับปริมาณงานที่ล้นในสำนักวิชาการ</p>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;font-size:12px;">
            <div style="background:#f8fafc;border:1px dashed #cbd5e1;border-radius:8px;padding:12px;">
              <div style="font-weight:800;color:#64748b;margin-bottom:8px;">โครงสร้างเดิม</div>
              <div style="background:#fff;border:1px solid #e2e8f0;padding:6px;border-radius:4px;margin-bottom:4px;">สำนักวิชาการ (งานไอที 48 รายการ)</div>
            </div>
            <div style="background:#f0f6ff;border:1px dashed #2b6cb0;border-radius:8px;padding:12px;">
              <div style="font-weight:800;color:#1e3a8a;margin-bottom:8px;">โครงสร้างแนะนำ</div>
              <div style="background:#dbeafe;border:1px solid #2b6cb0;padding:6px;border-radius:4px;margin-bottom:4px;">สำนักวิชาการ (งานทั่วไป)</div>
              <div style="background:#dcfce7;border:1px solid #22c55e;padding:6px;border-radius:4px;">หน่วยสนับสนุนไอที ✨ ใหม่</div>
            </div>
          </div>
        </div>`,
        `<button onclick="closeMgrModal()" style="padding:10px 20px;background:#f1f5f9;border:none;border-radius:8px;font-weight:700;cursor:pointer;">ยกเลิก</button>
         <button onclick="showToast('นำการแก้ไขนี้ไปใช้เรียบร้อยแล้ว ✓','success');closeMgrModal()" style="padding:10px 22px;background:#1e3a5f;color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer;">✔ นำไปใช้จริง</button>`
      );
    }
    function mgrAddNode() {
      _mgrModal('เพิ่มข้อมูลใหม่', 'เพิ่มหน่วยงาน/ภารกิจลงในผังโครงสร้าง',
        `<div style="display:flex;flex-direction:column;gap:14px;">
          <div><label style="font-size:12px;font-weight:700;display:block;margin-bottom:4px;">ชื่อภารกิจ/หน่วยงาน</label>
          <input id="newNodeName" type="text" placeholder="เช่น ฝ่ายพัฒนาระบบ" style="width:100%;padding:10px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:13px;outline:none;box-sizing:border-box;"></div>
          <div><label style="font-size:12px;font-weight:700;display:block;margin-bottom:4px;">ประเภทกลุ่มงาน</label>
          <select style="width:100%;padding:10px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:13px;outline:none;">
            <option>กลุ่มวิชาชีพเฉพาะ</option><option>กลุ่มสนับสนุนวิชาการ</option><option>กลุ่มสนับสนุนทั่วไป</option>
          </select></div>
          <div><label style="font-size:12px;font-weight:700;display:block;margin-bottom:4px;">หน่วยงานที่สังกัด (แม่ข่าย)</label>
          <select style="width:100%;padding:10px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:13px;outline:none;">
            <option>ผู้อำนวยการสำนัก</option><option>ฝ่ายนวัตกรรมดิจิทัล</option><option>ศูนย์ความมั่นคงปลอดภัยไซเบอร์</option>
          </select></div>
        </div>`,
        `<button onclick="closeMgrModal()" style="padding:10px 20px;background:#f1f5f9;border:none;border-radius:8px;font-weight:700;cursor:pointer;">ยกเลิก</button>
         <button onclick="const n=document.getElementById('newNodeName').value||'ข้อมูลใหม่';showToast('เพิ่ม '+n+' ลงในผังโครงสร้างเรียบร้อย','success');closeMgrModal()" style="padding:10px 22px;background:#1e3a5f;color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer;">➕ เพิ่มข้อมูล</button>`
      );
    }
    function mgrDeleteNode() {
      _mgrModal('ยืนยันลบข้อมูล', 'ฝ่ายนวัตกรรมดิจิทัล',
        `<div style="text-align:center;padding:10px 0;">
          <div style="font-size:48px;margin-bottom:12px;">🗑️</div>
          <div style="font-size:14px;font-weight:700;color:#0f172a;margin-bottom:8px;">คุณต้องการลบ "ฝ่ายนวัตกรรมดิจิทัล" ออกจากโครงสร้างหรือไม่?</div>
          <div style="font-size:12px;color:#ef4444;">การกระทำนี้ไม่สามารถยกเลิกได้ หากยืนยัน หน่วยงานและความสัมพันธ์ทั้งหมดจะถูกลบออก</div>
        </div>`,
        `<button onclick="closeMgrModal()" style="padding:10px 20px;background:#f1f5f9;border:none;border-radius:8px;font-weight:700;cursor:pointer;">ยกเลิก</button>
         <button onclick="showToast('ลบข้อมูลเรียบร้อยแล้ว','success');closeMgrModal()" style="padding:10px 22px;background:#dc2626;color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer;">🗑️ ยืนยันลบ</button>`
      );
    }
    function mgrRevalidate() {
      showToast('กำลังตรวจสอบโครงสร้างอัตโนมัติ...', 'info');
      setTimeout(() => showToast('ตรวจสอบเสร็จสิ้น: พบข้อผิดพลาด 1 จุด ⚠️', 'warning'), 1800);
    }
    function mgrSaveDraft() {
      const now = new Date();
      const t = `${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')} น.`;
      showToast('บันทึกร่างเรียบร้อยแล้ว — ' + t, 'success');
    }

    function showToast(msg, type = 'success') {
      const c = document.getElementById('toastContainer');
      const t = document.createElement('div');
      t.className = 'toast ' + (type === 'error' ? 'error' : type === 'warning' ? 'warning' : type === 'info' ? 'info' : '');
      const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
      t.innerHTML = `<span style="font-size:18px">${icons[type] || '✅'}</span><span class="toast-msg">${msg}</span>`;
      c.appendChild(t);
      setTimeout(() => t.remove(), 3500);
    }

    function switchTab(el, tabId) {
      const parent = el.closest('.tab-bar').parentElement;
      parent.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
      parent.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      const tc = document.getElementById(tabId);
      if (tc) tc.classList.add('active');
    }

    function filterTable(input, tableId) {
      const val = input.value.toLowerCase();
      const rows = document.querySelectorAll(`#${tableId} tbody tr`);
      rows.forEach(r => r.style.display = r.textContent.toLowerCase().includes(val) ? '' : 'none');
    }

    function filterByStatus(sel, tableId) {
      const val = sel.value;
      const rows = document.querySelectorAll(`#${tableId} tbody tr`);
      rows.forEach(r => {
        if (!val) { r.style.display = ''; return; }
        const text = r.innerHTML;
        const isMatch = (val === 'ตรวจสอบแล้ว' && text.includes('✅')) ||
          (val === 'pending' && text.includes('⏳')) ||
          (val === 'rejected' && text.includes('❌'));
        r.style.display = isMatch ? '' : 'none';
      });
    }

    function selectAll(cb, tableId) {
      document.querySelectorAll(`#${tableId} tbody input[type=checkbox]`).forEach(c => c.checked = cb.checked);
    }

    // INIT
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('page-login').style.display = 'flex';
    });
  </script>
</body>

</html>
